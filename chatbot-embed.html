<style>
  /* ---- Reset e base ---- */
  #sol-widget * { box-sizing: border-box; font-family: 'DM Sans', 'Segoe UI', sans-serif; }

  /* ---- Botão toggle ---- */
  #sol-toggle {
    position: fixed; bottom: 28px; right: 28px; z-index: 9998;
    width: 60px; height: 60px; border-radius: 50%; border: none; cursor: pointer;
    background: linear-gradient(145deg, #0A2540 0%, #1a6fc4 100%);
    box-shadow: 0 4px 24px rgba(26,111,196,0.5);
    transition: transform 0.25s, box-shadow 0.25s;
    display: flex; align-items: center; justify-content: center;
  }
  #sol-toggle:hover { transform: scale(1.1); box-shadow: 0 6px 32px rgba(26,111,196,0.65); }
  #sol-toggle.is-open { background: linear-gradient(145deg, #1a1a2e 0%, #374151 100%); }

  /* Ícone do toggle — alterna entre chat e X */
  #sol-toggle-icon-chat, #sol-toggle-icon-close { transition: opacity 0.2s, transform 0.2s; position: absolute; }
  #sol-toggle-icon-close { opacity: 0; transform: rotate(-90deg); }
  #sol-toggle.is-open #sol-toggle-icon-chat { opacity: 0; transform: rotate(90deg); }
  #sol-toggle.is-open #sol-toggle-icon-close { opacity: 1; transform: rotate(0deg); }

  /* Badge de notificação */
  #sol-badge {
    position: absolute; top: -3px; right: -3px;
    width: 22px; height: 22px; background: #ef4444; border-radius: 50%;
    display: none; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 800; color: white;
    border: 2px solid white; animation: sol-pulse 2s infinite;
  }
  @keyframes sol-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.4)} 50%{box-shadow:0 0 0 6px rgba(239,68,68,0)} }

  /* Tooltip de chamada */
  #sol-tooltip {
    position: fixed; bottom: 100px; right: 28px; z-index: 9997;
    background: white; border-radius: 14px; padding: 12px 16px;
    font-size: 13px; color: #1f2937; font-weight: 500;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12); display: none;
    border: 1px solid #e5e7eb; max-width: 220px; line-height: 1.4;
    animation: sol-fadein 0.3s ease;
  }
  #sol-tooltip::after {
    content: ''; position: absolute; bottom: -7px; right: 22px;
    width: 14px; height: 14px; background: white;
    border-right: 1px solid #e5e7eb; border-bottom: 1px solid #e5e7eb;
    transform: rotate(45deg);
  }
  #sol-tooltip-close {
    position: absolute; top: 6px; right: 8px;
    font-size: 16px; color: #9ca3af; cursor: pointer; background: none; border: none; padding: 0;
  }
  @keyframes sol-fadein { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

  /* ---- Janela do chat ---- */
  #sol-window {
    position: fixed; bottom: 100px; right: 28px; z-index: 9999;
    width: 370px; height: 560px; max-height: 82vh;
    background: white; border-radius: 20px;
    box-shadow: 0 12px 56px rgba(0,0,0,0.18);
    display: none; flex-direction: column; overflow: hidden;
    border: 1px solid rgba(0,0,0,0.06);
    animation: sol-slidein 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes sol-slidein { from{opacity:0;transform:translateY(20px) scale(0.96)} to{opacity:1;transform:translateY(0) scale(1)} }
  @media (max-width: 480px) {
    #sol-window { width: calc(100vw - 16px); right: 8px; bottom: 84px; height: 72vh; border-radius: 16px; }
    #sol-toggle { bottom: 18px; right: 18px; }
    #sol-tooltip { right: 8px; bottom: 96px; }
  }

  /* Header */
  #sol-header {
    background: linear-gradient(135deg, #0A2540 0%, #1a6fc4 100%);
    padding: 14px 16px 12px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
  }
  #sol-header-left { display: flex; align-items: center; gap: 10px; }
  #sol-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    font-size: 18px;
  }
  #sol-header-name { color: white; font-size: 14px; font-weight: 700; margin: 0; line-height: 1.2; }
  #sol-header-status { color: rgba(255,255,255,0.75); font-size: 11px; margin: 0; display: flex; align-items: center; gap: 4px; }
  #sol-status-dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; display: inline-block; animation: sol-blink 2s infinite; }
  @keyframes sol-blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
  #sol-header-close {
    background: rgba(255,255,255,0.12); border: none; cursor: pointer;
    width: 30px; height: 30px; border-radius: 50%; color: white;
    display: flex; align-items: center; justify-content: center; transition: background 0.2s;
  }
  #sol-header-close:hover { background: rgba(255,255,255,0.22); }

  /* Barra de progresso de qualificação */
  #sol-progress-bar {
    background: #f1f5f9; padding: 6px 14px; flex-shrink: 0;
    display: none; align-items: center; gap: 8px;
  }
  #sol-progress-label { font-size: 10px; color: #64748b; white-space: nowrap; font-weight: 600; }
  #sol-progress-track { flex: 1; height: 4px; background: #e2e8f0; border-radius: 2px; overflow: hidden; }
  #sol-progress-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, #1a6fc4, #38bdf8); transition: width 0.6s ease; width: 0%; }

  /* Área de mensagens */
  #sol-messages {
    flex: 1; overflow-y: auto; padding: 14px 14px 10px;
    background: #f8fafc; display: flex; flex-direction: column; gap: 10px;
    scroll-behavior: smooth;
  }
  #sol-messages::-webkit-scrollbar { width: 4px; }
  #sol-messages::-webkit-scrollbar-track { background: transparent; }
  #sol-messages::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }

  /* Mensagens */
  .sol-msg { display: flex; flex-direction: column; max-width: 86%; animation: sol-msg-in 0.25s ease; }
  @keyframes sol-msg-in { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .sol-msg.user { align-self: flex-end; }
  .sol-msg.bot { align-self: flex-start; }
  .sol-bubble {
    padding: 10px 14px; border-radius: 18px; font-size: 13.5px;
    line-height: 1.55; word-break: break-word;
  }
  .sol-msg.user .sol-bubble {
    background: linear-gradient(135deg, #0A2540, #1a6fc4);
    color: white; border-bottom-right-radius: 5px;
  }
  .sol-msg.bot .sol-bubble {
    background: white; color: #1e293b;
    border: 1px solid #e2e8f0; border-bottom-left-radius: 5px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }
  /* Renderiza quebras e negrito simples */
  .sol-bubble b { font-weight: 700; color: #0A2540; }
  .sol-bubble .highlight { color: #1a6fc4; font-weight: 700; }
  .sol-bubble .economia { color: #16a34a; font-weight: 700; }

  /* Botões de atalho */
  .sol-btns { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .sol-btn {
    padding: 7px 13px; font-size: 12px; font-weight: 600;
    border-radius: 20px; border: 1.5px solid #1a6fc4;
    color: #1a6fc4; background: white; cursor: pointer;
    transition: all 0.18s; white-space: nowrap;
  }
  .sol-btn:hover { background: #1a6fc4; color: white; transform: translateY(-1px); }
  .sol-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Mensagem de prova social (fixa no topo da conversa) */
  #sol-social-proof {
    display: flex; align-items: center; gap: 8px;
    background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 10px;
    padding: 8px 12px; margin-bottom: 4px; flex-shrink: 0;
  }
  #sol-social-proof p { font-size: 11px; color: #166534; margin: 0; font-weight: 500; }

  /* Digitando */
  #sol-typing { display: none; align-self: flex-start; }
  #sol-typing .sol-bubble { display: flex; gap: 4px; align-items: center; padding: 12px 16px; }
  .sol-dot { width: 7px; height: 7px; border-radius: 50%; background: #94a3b8; animation: sol-bounce 1.2s infinite; }
  .sol-dot:nth-child(2) { animation-delay: 0.18s; }
  .sol-dot:nth-child(3) { animation-delay: 0.36s; }
  @keyframes sol-bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

  /* ---- Lead form ---- */
  #sol-lead-form {
    padding: 12px 14px; background: #eff6ff;
    border-top: 1px solid #bfdbfe; flex-shrink: 0; display: none;
  }
  #sol-lead-form p { font-size: 12px; font-weight: 700; color: #1e40af; margin: 0 0 8px; }
  #sol-lead-form input {
    width: 100%; padding: 9px 12px; font-size: 13px;
    border: 1.5px solid #bfdbfe; border-radius: 9px; margin-bottom: 6px;
    outline: none; background: white; transition: border-color 0.2s;
  }
  #sol-lead-form input:focus { border-color: #1a6fc4; }
  #sol-lead-submit {
    width: 100%; padding: 9px; font-size: 13px; font-weight: 700;
    color: white; background: linear-gradient(135deg, #0A2540, #1a6fc4);
    border: none; border-radius: 9px; cursor: pointer; transition: opacity 0.2s;
  }
  #sol-lead-submit:hover { opacity: 0.9; }

  /* ---- Input area ---- */
  #sol-input-area {
    padding: 10px 14px 12px; background: white;
    border-top: 1px solid #f1f5f9; flex-shrink: 0;
  }
  #sol-input-row { display: flex; align-items: center; gap: 8px; }
  #sol-lead-btn {
    width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid #e2e8f0;
    cursor: pointer; background: white; color: #94a3b8;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0;
  }
  #sol-lead-btn:hover { border-color: #1a6fc4; color: #1a6fc4; background: #eff6ff; }
  #sol-input {
    flex: 1; padding: 9px 14px; font-size: 13.5px;
    background: #f1f5f9; border: 1.5px solid transparent;
    border-radius: 22px; outline: none; transition: all 0.2s; color: #1e293b;
  }
  #sol-input:focus { background: #e8f0fe; border-color: #1a6fc4; }
  #sol-send-btn {
    width: 34px; height: 34px; border-radius: 50%; border: none; cursor: pointer;
    background: linear-gradient(135deg, #0A2540, #1a6fc4); color: white;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0;
  }
  #sol-send-btn:hover { transform: scale(1.08); }
  #sol-send-btn:disabled { background: #cbd5e1; cursor: not-allowed; transform: none; }
  #sol-footer { text-align: center; font-size: 10.5px; color: #94a3b8; margin-top: 6px; }
  #sol-footer a { color: #1a6fc4; text-decoration: none; }

  /* ---- Mensagem de inatividade ---- */
  #sol-inactivity-msg {
    position: absolute; bottom: 70px; left: 14px; right: 14px; z-index: 2;
    background: #fefce8; border: 1px solid #fde68a; border-radius: 10px;
    padding: 9px 12px; font-size: 12px; color: #92400e; display: none;
    animation: sol-fadein 0.3s ease;
  }
</style>

        { l: '🔄 Trocar de contador', v: 'Quero trocar de contador' },
        { l: '💰 Pagar menos imposto', v: 'Como posso pagar menos imposto?' },
        { l: '❓ Tirar dúvidas', v: 'Tenho dúvidas sobre contabilidade' },
      ]
    },
  };

  // ---------- Prova social rotativa ----------
  var PROVAS = [
    '+200 empresas em Limeira confiam na Sol Contábil',
    'Média de economia: R$ 12.000/ano por cliente',
    'Resposta garantida em até 2 horas úteis',
    'Atendimento sem burocracia — do MEI ao Lucro Real',
    'Rodolfo Assunção • CRC/SP 1SP353033/O-5',
  ];
  var provaIdx = 0;
  setInterval(function() {
    provaIdx = (provaIdx + 1) % PROVAS.length;
    EL.proofText.style.opacity = '0';
    setTimeout(function() { EL.proofText.textContent = PROVAS[provaIdx]; EL.proofText.style.opacity = '1'; }, 300);
  }, 5000);
  EL.proofText.style.transition = 'opacity 0.3s';

  // ---------- Tooltip contextual ----------
  var TOOLTIPS = {
    simuladores: '📊 Dúvida sobre o resultado? Te explico!',
    cotacao: '💼 Precisa de ajuda com a cotação?',
    abertura: '🏢 Quer abrir sua empresa? Te ajudo!',
    troca: '🔄 Pense bem antes de trocar — te conto mais!',
    home: '💬 Olá! Posso ajudar com impostos? 😊',
    blog: '💡 Surgiu alguma dúvida? É só perguntar!',
    mei: '👤 Dúvidas sobre MEI? Respondo agora!',
  };
  S.tooltipTimer = setTimeout(function() {
    if (!S.open) {
      EL.tooltipText.textContent = TOOLTIPS[PAGE_CTX] || TOOLTIPS.home;
      EL.tooltip.style.display = 'block';
      EL.badge.style.display = 'flex';
      setTimeout(function() {
        if (EL.tooltip.style.display === 'block') EL.tooltip.style.display = 'none';
      }, 7000);
    }
  }, CFG.tooltipDelay);

  EL.tooltipClose.addEventListener('click', function(e) {
    e.stopPropagation();
    EL.tooltip.style.display = 'none';
  });

  // ---------- Abrir/fechar ----------
  function openChat() {
    S.open = true;
    EL.window.style.display = 'flex';
    EL.toggle.classList.add('is-open');
    EL.badge.style.display = 'none';
    EL.tooltip.style.display = 'none';
    EL.input.focus();
    trackEvt('chat_open', { page: S.page });
    resetInactivityTimer();

    if (!S.welcomed) {
      S.welcomed = true;
      // Retorno? Mostra boas-vindas especial
      var isReturn = sessionStorage.getItem('sol_has_chatted') === '1';
      if (isReturn) {
        setTimeout(function() {
          addBotMsg('Bem-vindo de volta! 👋 Posso continuar te ajudando.\n\nSobre o que você gostaria de falar?', [
            { l: '➡️ Continuar de onde parei', v: 'Quero continuar nossa conversa' },
            { l: '🆕 Novo assunto', v: 'Tenho um novo assunto' },
          ]);
        }, 400);
      } else {
        var ctx = WELCOME[PAGE_CTX] || WELCOME.home;
        setTimeout(function() { addBotMsg(ctx.msg, ctx.btns); }, 400);
      }
      // Após 3 msgs, mostra barra de qualificação
      EL.progressBar.style.display = 'flex';
    }
  }

  function closeChat() {
    S.open = false;
    EL.window.style.display = 'none';
    EL.toggle.classList.remove('is-open');
    clearInactivityTimer();
  }

  EL.toggle.addEventListener('click', function() { S.open ? closeChat() : openChat(); });
  EL.headerClose.addEventListener('click', closeChat);

  // ---------- Inatividade proativa ----------
  var INACTIVITY_MSGS = [
    { t: '💬 Ainda aqui? Se preferir, posso passar o WhatsApp direto do Rodolfo para uma conversa rápida.', btn: 'Quero o WhatsApp do Rodolfo' },
    { t: '⏰ Tem alguma dúvida que não sabe como formular? Me conta a situação e eu ajudo!', btn: null },
    { t: '🎯 Muitas empresas em Limeira economizam mais de R$ 1.000/mês trocando de regime tributário. Quer saber se é o seu caso?', btn: 'Quero saber mais' },
  ];
  var inactIdx = 0;

  function resetInactivityTimer() {
    clearInactivityTimer();
    if (!S.open) return;
    S.inactivityTimer = setTimeout(function() {
      var m = INACTIVITY_MSGS[inactIdx % INACTIVITY_MSGS.length];
      EL.inactivityMsg.innerHTML = m.t + (m.btn ? ' <a href="#" onclick="solInactBtn(\''+m.btn+'\');return false;" style="color:#1a6fc4;font-weight:700">'+m.btn+' →</a>' : '');
      EL.inactivityMsg.style.display = 'block';
      inactIdx++;
      setTimeout(function() { EL.inactivityMsg.style.display = 'none'; }, 12000);
    }, CFG.inactivityDelay);
  }

  function clearInactivityTimer() { if (S.inactivityTimer) clearTimeout(S.inactivityTimer); }

  window.solInactBtn = function(text) {
    EL.inactivityMsg.style.display = 'none';
    sendMsg(text);
  };

  // ---------- Render de mensagem (com markdown simples) ----------
  function renderMd(text) {
    return text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
      .replace(/__(.*?)__/g, '<b>$1</b>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/`(.*?)`/g, '<code style="background:#f1f5f9;padding:1px 4px;border-radius:4px;font-size:12px">$1</code>')
      .replace(/\n/g, '<br>');
  }

  function addBotMsg(text, btns) {
    // Limpa botões de mensagens anteriores
    document.querySelectorAll('.sol-btn:not(:disabled)').forEach(function(b) { b.disabled = true; b.style.opacity='0.35'; });

    var div = document.createElement('div');
    div.className = 'sol-msg bot';
    var bubble = document.createElement('div');
    bubble.className = 'sol-bubble';
    bubble.innerHTML = renderMd(text);
    div.appendChild(bubble);

    if (btns && btns.length) {
      var btnsDiv = document.createElement('div');
      btnsDiv.className = 'sol-btns';
      btns.forEach(function(b) {
        var btn = document.createElement('button');
        btn.className = 'sol-btn';
        btn.textContent = b.l;
        btn.addEventListener('click', function() { sendMsg(b.v || b.l); });
        btnsDiv.appendChild(btn);
      });
      div.appendChild(btnsDiv);
    }

    EL.messages.insertBefore(div, EL.typing);
    EL.messages.scrollTop = EL.messages.scrollHeight;
    S.msgCount++;
    trimMsgs();
  }

  function addUserMsg(text) {
    var div = document.createElement('div');
    div.className = 'sol-msg user';
    var bubble = document.createElement('div');
    bubble.className = 'sol-bubble';
    bubble.textContent = text;
    div.appendChild(bubble);
    EL.messages.insertBefore(div, EL.typing);
    EL.messages.scrollTop = EL.messages.scrollHeight;
    S.msgCount++;
    trimMsgs();
  }

  // Limita DOM de mensagens
  function trimMsgs() {
    var msgs = EL.messages.querySelectorAll('.sol-msg:not(#sol-typing)');
    if (msgs.length > CFG.maxMsgs) msgs[0].remove();
  }

  function showTyping() { EL.typing.style.display = 'flex'; EL.messages.scrollTop = EL.messages.scrollHeight; }
  function hideTyping() { EL.typing.style.display = 'none'; }

  // ---------- Score de qualificação ----------
  function updateScore(delta) {
    S.qualScore = Math.min(100, Math.max(0, S.qualScore + delta));
    EL.progressFill.style.width = S.qualScore + '%';
    EL.progressPct.textContent = S.qualScore + '%';
    var label = S.qualScore < 30 ? 'Iniciando conversa' : S.qualScore < 60 ? 'Interesse identificado' : S.qualScore < 85 ? 'Alta probabilidade' : '🔥 Lead qualificado!';
    $('sol-progress-label').textContent = label;
  }

  // ---------- Enviar mensagem ----------
  async function sendMsg(text) {
    var msg = text || EL.input.value.trim();
    if (!msg || S.loading) return;
    EL.input.value = '';
    S.loading = true;
    EL.sendBtn.disabled = true;
    EL.inactivityMsg.style.display = 'none';
    sessionStorage.setItem('sol_has_chatted', '1');

    addUserMsg(msg);
    showTyping();
    updateScore(15);
    trackEvt('chat_message', { msg_count: S.msgCount });
    resetInactivityTimer();

    try {
      var ctrl = new AbortController();
      var tid = setTimeout(function() { ctrl.abort(); }, 20000);
      var res = await fetch(CFG.apiUrl + '/api/trpc/chat.sendMessage', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ json: { sessionId: S.sessionId, message: msg, page: S.page, leadData: S.leadData } }),
        signal: ctrl.signal,
      });
      clearTimeout(tid);
      var data = await res.json();
      hideTyping();
      var reply = (data.result && data.result.data && data.result.data.json && data.result.data.json.reply)
        || 'Desculpe, tive um probleminha técnico! 😅\n\nFale diretamente com o Rodolfo: **WhatsApp (19) 98200-3732**';

      // Detecta dados de lead na resposta
      var newLead = data.result && data.result.data && data.result.data.json && data.result.data.json.leadData;
      if (newLead) { Object.assign(S.leadData, newLead); if (S.leadData.whatsapp || S.leadData.name) saveLead(); }

      // Score por tipo de resposta
      if (reply.includes('WhatsApp') || reply.includes('diagnóstico')) updateScore(20);
      if (reply.includes('economia') || reply.includes('R$')) updateScore(10);

      // Após 4ª mensagem, adiciona CTA suave
      var extraBtns = null;
      if (S.msgCount >= 6 && !S.leadSaved) {
        extraBtns = [
          { l: '📱 Falar com Rodolfo agora', v: '__wpp__' },
          { l: '📋 Deixar meu contato', v: '__lead__' },
        ];
      } else if (S.msgCount >= 3 && S.qualScore >= 45) {
        extraBtns = [{ l: '📅 Agendar conversa gratuita', v: 'Quero agendar uma conversa gratuita com o Rodolfo' }];
      }

      addBotMsg(reply, extraBtns);

    } catch(e) {
      hideTyping();
      var wppLink = 'https://wa.me/' + CFG.whatsapp + '?text=' + encodeURIComponent('Olá! Vim pelo site da Sol Contábil e gostaria de ajuda.');
      addBotMsg('Desculpe, tive um probleminha técnico! 😅\n\nMas não se preocupe — você pode falar diretamente com o **' + CFG.whatsappNome + '** pelo WhatsApp:', [
        { l: '📱 Abrir WhatsApp agora', v: '__wpp__' },
      ]);
    }

    S.loading = false;
    EL.sendBtn.disabled = false;
  }

  // Intercepta ações especiais __wpp__ e __lead__
  document.addEventListener('click', function(e) {
    var btn = e.target.closest('.sol-btn');
    if (!btn) return;
    var val = btn.textContent.trim();
    if (btn.dataset && btn.dataset.action === '__wpp__') { abrirWpp(); return; }
  });

  // Sobrescreve sendMsg para interceptar ações internas
  var _sendMsg = sendMsg;
  sendMsg = function(text) {
    if (text === '__wpp__') { abrirWpp(); return; }
    if (text === '__lead__') { toggleLeadForm(); return; }
    _sendMsg(text);
  };

  function abrirWpp() {
    var msg = 'Olá! Vim pelo site da Sol Contábil';
    if (S.leadData.name) msg += ', me chamo ' + S.leadData.name;
    msg += ' e gostaria de uma consultoria gratuita.';
    window.open('https://wa.me/' + CFG.whatsapp + '?text=' + encodeURIComponent(msg), '_blank');
    trackEvt('whatsapp_click', { source: 'chatbot' });
  }

  // ---------- Lead form ----------
  function toggleLeadForm() {
    EL.leadForm.style.display = EL.leadForm.style.display === 'block' ? 'none' : 'block';
    if (EL.leadForm.style.display === 'block') EL.leadName.focus();
  }

  EL.leadBtn.addEventListener('click', toggleLeadForm);

  EL.leadSubmit.addEventListener('click', async function() {
    var name = EL.leadName.value.trim();
    var wpp = EL.leadWpp.value.trim();
    var email = EL.leadEmail.value.trim();
    if (!name || !wpp) { alert('Por favor, preencha nome e WhatsApp.'); return; }
    var wppNums = wpp.replace(/\D/g,'');
    if (wppNums.length < 10) { alert('WhatsApp inválido. Inclua DDD, ex: (19) 99999-9999'); return; }
    Object.assign(S.leadData, { name:name, whatsapp:wpp, email:email });
    await saveLead();
    S.leadSaved = true;
    EL.leadForm.style.display = 'none';
    updateScore(25);
    trackEvt('lead_form_submit', { name: name });
    addBotMsg('Perfeito, **' + name.split(' ')[0] + '**! 🎉 Seus dados foram registrados com sucesso.\n\nO Rodolfo Assunção vai entrar em contato em até **2 horas úteis**.\n\nSe preferir não esperar:', [
      { l: '📱 Falar agora no WhatsApp', v: '__wpp__' },
    ]);
  });

  async function saveLead() {
    try {
      // Salva no localStorage como backup
      localStorage.setItem('sol_lead', JSON.stringify(Object.assign({ ts: new Date().toISOString(), page: S.page }, S.leadData)));
      await fetch(CFG.apiUrl + '/api/trpc/leads.save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ json: Object.assign({ sessionId: S.sessionId }, S.leadData) }),
      });
    } catch(e) {}
  }

  // ---------- Máscara WhatsApp ----------
  window.solMascaraWpp = function(input) {
    var v = input.value.replace(/\D/g,'').substring(0,11);
    if (v.length > 6) v = '('+v.substring(0,2)+') '+v.substring(2,7)+'-'+v.substring(7);
    else if (v.length > 2) v = '('+v.substring(0,2)+') '+v.substring(2);
    else if (v.length > 0) v = '('+v;
    input.value = v;
  };

  // ---------- Input ----------
  EL.input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
  });
  EL.sendBtn.addEventListener('click', function() { sendMsg(); });
  EL.input.addEventListener('input', function() { resetInactivityTimer(); });

  // ---------- Google Analytics ----------
  function trackEvt(name, params) {
    try { if (typeof gtag !== 'undefined') gtag('event', name, Object.assign({ event_category: 'chatbot' }, params || {})); } catch(e) {}
  }

})();
</script>
<!-- FIM DO CHATBOT WIDGET - SOL CONTÁBIL v2 -->
