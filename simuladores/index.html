<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simuladores - Sol Contábil</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body class="bg-gray-50">

<header class="bg-blue-900 text-white p-4">
  <div class="max-w-6xl mx-auto">
    <h1 class="text-2xl font-bold">Simuladores Inteligentes 2026</h1>
  </div>
</header>

<main class="max-w-6xl mx-auto p-4 py-8">
  <div class="bg-white rounded-lg shadow-lg p-6">
    <div class="flex gap-4 mb-6 flex-wrap">
      <button onclick="mostrarSimulador('mei')" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">MEI vs LTDA</button>
      <button onclick="mostrarSimulador('regime')" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Regime</button>
      <button onclick="mostrarSimulador('abertura')" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Abertura</button>
      <button onclick="mostrarSimulador('honorarios')" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Honorários</button>
      <button onclick="mostrarSimulador('economia')" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Economia</button>
      <button onclick="mostrarSimulador('pfvspj')" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">PF vs PJ</button>
    </div>

    <!-- MEI vs LTDA -->
    <div id="mei" class="simulador">
      <h2 class="text-2xl font-bold mb-4">MEI vs LTDA</h2>
      <div class="grid grid-cols-2 gap-4 mb-4">
        <input type="number" id="mei_faturamento" placeholder="Faturamento Mensal" class="border p-2 rounded">
        <select id="mei_atividade" class="border p-2 rounded">
          <option value="comercio">Comércio</option>
          <option value="servicos">Serviços</option>
        </select>
      </div>
      <button onclick="simularMei()" class="bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700">Calcular</button>
      <div id="mei_resultado" class="mt-6"></div>
    </div>

    <!-- Regime Tributário -->
    <div id="regime" class="simulador hidden">
      <h2 class="text-2xl font-bold mb-4">Regime Tributário</h2>
      <div class="grid grid-cols-2 gap-4 mb-4">
        <input type="number" id="regime_faturamento" placeholder="Faturamento Mensal" class="border p-2 rounded">
        <select id="regime_atividade" class="border p-2 rounded">
          <option value="comercio">Comércio</option>
          <option value="servicos">Serviços</option>
        </select>
      </div>
      <button onclick="simularRegime()" class="bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700">Calcular</button>
      <div id="regime_resultado" class="mt-6"></div>
    </div>

    <!-- Abertura -->
    <div id="abertura" class="simulador hidden">
      <h2 class="text-2xl font-bold mb-4">Qual Empresa Abrir?</h2>
      <div class="grid grid-cols-2 gap-4 mb-4">
        <input type="number" id="abertura_faturamento" placeholder="Faturamento Mensal" class="border p-2 rounded">
        <select id="abertura_atividade" class="border p-2 rounded">
          <option value="comercio">Comércio</option>
          <option value="servicos">Serviços</option>
        </select>
        <select id="abertura_socios" class="border p-2 rounded">
          <option value="nao">Sem Sócios</option>
          <option value="sim">Com Sócios</option>
        </select>
      </div>
      <button onclick="simularAbertura()" class="bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700">Calcular</button>
      <div id="abertura_resultado" class="mt-6"></div>
    </div>

    <!-- Honorários -->
    <div id="honorarios" class="simulador hidden">
      <h2 class="text-2xl font-bold mb-4">Honorários Contábeis</h2>
      <div class="grid grid-cols-2 gap-4 mb-4">
        <input type="number" id="honorarios_faturamento" placeholder="Faturamento Mensal" class="border p-2 rounded">
        <input type="number" id="honorarios_funcionarios" placeholder="Nº de Funcionários" class="border p-2 rounded">
        <select id="honorarios_regime" class="border p-2 rounded">
          <option value="simples">Simples Nacional</option>
          <option value="lucroPresumido">Lucro Presumido</option>
          <option value="lucroReal">Lucro Real</option>
        </select>
        <input type="number" id="honorarios_notas" placeholder="Notas Fiscais/Mês" value="10" class="border p-2 rounded">
      </div>
      <button onclick="simularHonorarios()" class="bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700">Calcular</button>
      <div id="honorarios_resultado" class="mt-6"></div>
    </div>

    <!-- Economia -->
    <div id="economia" class="simulador hidden">
      <h2 class="text-2xl font-bold mb-4">Economia Tributária</h2>
      <div class="grid grid-cols-2 gap-4 mb-4">
        <input type="number" id="economia_faturamento" placeholder="Faturamento Mensal" class="border p-2 rounded">
        <select id="economia_regime" class="border p-2 rounded">
          <option value="MEI">MEI</option>
          <option value="Simples Nacional">Simples Nacional</option>
          <option value="Lucro Presumido">Lucro Presumido</option>
        </select>
        <select id="economia_atividade" class="border p-2 rounded">
          <option value="comercio">Comércio</option>
          <option value="servicos">Serviços</option>
        </select>
      </div>
      <button onclick="simularEconomia()" class="bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700">Calcular</button>
      <div id="economia_resultado" class="mt-6"></div>
    </div>

    <!-- PF vs PJ -->
    <div id="pfvspj" class="simulador hidden">
      <h2 class="text-2xl font-bold mb-4">PF vs PJ para Profissionais de Saúde</h2>
      <div class="grid grid-cols-2 gap-4 mb-4">
        <input type="number" id="pfvspj_faturamento" placeholder="Faturamento Mensal" class="border p-2 rounded">
        <select id="pfvspj_especialidade" class="border p-2 rounded">
          <option value="medico">Médico</option>
          <option value="dentista">Dentista</option>
          <option value="psicólogo">Psicólogo</option>
          <option value="fisioterapeuta">Fisioterapeuta</option>
        </select>
      </div>
      <button onclick="simularPfVsPj()" class="bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700">Calcular</button>
      <div id="pfvspj_resultado" class="mt-6"></div>
    </div>
  </div>
</main>

<script>
// Parâmetros 2026
const PARAMS = {
  dasMEI: { comercio: 82.05, servicos: 86.05 },
  limiteMEI: 81000,
  simplesAnexoI: [
    { ate: 180000, aliquota: 0.04 },
    { ate: 360000, aliquota: 0.073 },
    { ate: 720000, aliquota: 0.095 },
    { ate: 1800000, aliquota: 0.107 },
    { ate: 3600000, aliquota: 0.143 },
    { ate: 4800000, aliquota: 0.19 }
  ],
  simplesAnexoIII: [
    { ate: 180000, aliquota: 0.06 },
    { ate: 360000, aliquota: 0.112 },
    { ate: 720000, aliquota: 0.135 },
    { ate: 1800000, aliquota: 0.16 },
    { ate: 3600000, aliquota: 0.21 },
    { ate: 4800000, aliquota: 0.33 }
  ]
};

function mostrarSimulador(id) {
  document.querySelectorAll('.simulador').forEach(el => el.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function getAliquotaSimples(faturamento, tabela) {
  const rbt12 = faturamento * 12;
  for (let faixa of tabela) {
    if (rbt12 <= faixa.ate) return faixa.aliquota;
  }
  return tabela[tabela.length - 1].aliquota;
}

function simularMei() {
  const faturamento = parseFloat(document.getElementById('mei_faturamento').value) || 0;
  const atividade = document.getElementById('mei_atividade').value;
  
  const das = atividade === 'comercio' ? PARAMS.dasMEI.comercio : PARAMS.dasMEI.servicos;
  const meiLiquido = faturamento - das;
  
  const tabela = atividade === 'comercio' ? PARAMS.simplesAnexoI : PARAMS.simplesAnexoIII;
  const aliquota = getAliquotaSimples(faturamento, tabela);
  const ltdaImposto = faturamento * aliquota;
  const ltdaLiquido = faturamento - ltdaImposto - 250;
  
  const melhor = meiLiquido > ltdaLiquido ? 'MEI' : 'LTDA';
  
  document.getElementById('mei_resultado').innerHTML = `
    <div class="bg-blue-50 p-4 rounded">
      <p class="font-bold text-lg mb-2">Melhor: ${melhor}</p>
      <p>MEI: R$ ${meiLiquido.toFixed(2)}/mês</p>
      <p>LTDA: R$ ${ltdaLiquido.toFixed(2)}/mês</p>
      <p class="mt-2 text-green-600 font-bold">Diferença: R$ ${Math.abs(meiLiquido - ltdaLiquido).toFixed(2)}/mês</p>
    </div>
  `;
}

function simularRegime() {
  const faturamento = parseFloat(document.getElementById('regime_faturamento').value) || 0;
  const atividade = document.getElementById('regime_atividade').value;
  
  const tabela = atividade === 'comercio' ? PARAMS.simplesAnexoI : PARAMS.simplesAnexoIII;
  const aliquota = getAliquotaSimples(faturamento, tabela);
  const simples = faturamento * aliquota;
  
  const presumido = faturamento * 0.25;
  const lucroReal = faturamento * 0.30;
  
  document.getElementById('regime_resultado').innerHTML = `
    <div class="bg-blue-50 p-4 rounded">
      <p class="font-bold text-lg mb-2">Melhor: Simples Nacional</p>
      <p>Simples: R$ ${simples.toFixed(2)}/mês</p>
      <p>Presumido: R$ ${presumido.toFixed(2)}/mês</p>
      <p>Real: R$ ${lucroReal.toFixed(2)}/mês</p>
      <p class="mt-2 text-green-600 font-bold">Economia: R$ ${(presumido - simples).toFixed(2)}/mês</p>
    </div>
  `;
}

function simularAbertura() {
  const faturamento = parseFloat(document.getElementById('abertura_faturamento').value) || 0;
  const atividade = document.getElementById('abertura_atividade').value;
  const temSocios = document.getElementById('abertura_socios').value === 'sim';
  
  const anual = faturamento * 12;
  let tipo, regime, custo;
  
  if (anual <= 81000) {
    tipo = 'MEI';
    regime = 'MEI';
    custo = 0;
  } else if (anual <= 360000) {
    tipo = 'ME';
    regime = 'Simples Nacional';
    custo = 1500;
  } else if (anual <= 4800000) {
    tipo = 'EPP';
    regime = 'Simples Nacional';
    custo = 2000;
  } else {
    tipo = 'LTDA/SLU';
    regime = 'Lucro Presumido/Real';
    custo = 3000;
  }
  
  if (temSocios) tipo = 'LTDA';
  
  document.getElementById('abertura_resultado').innerHTML = `
    <div class="bg-blue-50 p-4 rounded">
      <p class="font-bold text-lg mb-2">Recomendação: ${tipo}</p>
      <p>Regime: ${regime}</p>
      <p>Custo Abertura: R$ ${custo.toFixed(2)}</p>
      <p class="mt-2 text-green-600 font-bold">Pronto para abrir!</p>
    </div>
  `;
}

function simularHonorarios() {
  const faturamento = parseFloat(document.getElementById('honorarios_faturamento').value) || 0;
  const funcionarios = parseInt(document.getElementById('honorarios_funcionarios').value) || 0;
  const regime = document.getElementById('honorarios_regime').value;
  const notas = parseInt(document.getElementById('honorarios_notas').value) || 10;
  
  let base = 425;
  if (faturamento > 15000) base = 650;
  if (faturamento > 30000) base = 1000;
  if (faturamento > 60000) base = 1600;
  
  let adicional = funcionarios * 80;
  if (regime === 'lucroPresumido') adicional += base * 0.40;
  if (regime === 'lucroReal') adicional += base * 0.80;
  if (notas > 100) adicional += 250;
  else if (notas > 30) adicional += 120;
  else if (notas > 10) adicional += 50;
  
  const total = base + adicional;
  
  document.getElementById('honorarios_resultado').innerHTML = `
    <div class="bg-blue-50 p-4 rounded">
      <p class="font-bold text-lg mb-2">Faixa de Honorários</p>
      <p>Mínimo: R$ ${(total * 0.85).toFixed(2)}</p>
      <p>Estimado: R$ ${total.toFixed(2)}</p>
      <p>Máximo: R$ ${(total * 1.15).toFixed(2)}</p>
    </div>
  `;
}

function simularEconomia() {
  const faturamento = parseFloat(document.getElementById('economia_faturamento').value) || 0;
  const regimeAtual = document.getElementById('economia_regime').value;
  const atividade = document.getElementById('economia_atividade').value;
  
  let impostoAtual = 0;
  if (regimeAtual === 'MEI') impostoAtual = 86.05;
  else if (regimeAtual === 'Simples Nacional') {
    const tabela = atividade === 'comercio' ? PARAMS.simplesAnexoI : PARAMS.simplesAnexoIII;
    impostoAtual = faturamento * getAliquotaSimples(faturamento, tabela);
  } else impostoAtual = faturamento * 0.25;
  
  const tabela = atividade === 'comercio' ? PARAMS.simplesAnexoI : PARAMS.simplesAnexoIII;
  const impostoOtimizado = faturamento * getAliquotaSimples(faturamento, tabela);
  const economia = impostoAtual - impostoOtimizado;
  
  document.getElementById('economia_resultado').innerHTML = `
    <div class="bg-blue-50 p-4 rounded">
      <p class="font-bold text-lg mb-2">Economia Tributária</p>
      <p>Imposto Atual: R$ ${impostoAtual.toFixed(2)}/mês</p>
      <p>Imposto Otimizado: R$ ${impostoOtimizado.toFixed(2)}/mês</p>
      <p class="mt-2 text-green-600 font-bold">Economia: R$ ${Math.max(0, economia).toFixed(2)}/mês</p>
      <p class="text-green-600 font-bold">Anual: R$ ${Math.max(0, economia * 12).toFixed(2)}</p>
    </div>
  `;
}

function simularPfVsPj() {
  const faturamento = parseFloat(document.getElementById('pfvspj_faturamento').value) || 0;
  
  const inssPF = Math.min(faturamento * 0.20, 1695.11);
  const issPF = faturamento * 0.05;
  const irpfPF = Math.max(0, (faturamento - inssPF - 5000) * 0.15);
  const totalPF = inssPF + issPF + irpfPF;
  
  const dasPJ = faturamento * 0.06;
  const proLabore = faturamento * 0.28;
  const inssPJ = Math.min(proLabore * 0.11, 932.31);
  const irpfPJ = Math.max(0, (proLabore - inssPJ - 5000) * 0.15);
  const totalPJ = dasPJ + inssPJ + irpfPJ;
  
  const melhor = totalPF > totalPJ ? 'PJ' : 'PF';
  
  document.getElementById('pfvspj_resultado').innerHTML = `
    <div class="bg-blue-50 p-4 rounded">
      <p class="font-bold text-lg mb-2">Melhor: ${melhor}</p>
      <p>PF Total: R$ ${totalPF.toFixed(2)}/mês</p>
      <p>PJ Total: R$ ${totalPJ.toFixed(2)}/mês</p>
      <p class="mt-2 text-green-600 font-bold">Economia: R$ ${Math.max(0, totalPF - totalPJ).toFixed(2)}/mês</p>
    </div>
  `;
}
</script>

</body>
</html>
